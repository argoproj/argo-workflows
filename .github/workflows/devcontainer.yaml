name: Dev Container

on:
  push:
    paths:
      - ".devcontainer/**"
      - "hack/k8s-versions.sh"
      - ".github/workflows/devcontainer.yaml"
    branches:
      - main
  pull_request:
    paths:
      - ".devcontainer/**"
      - "hack/k8s-versions.sh"
      - ".github/workflows/devcontainer.yaml"
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # a workaround to disable harden runner
  STEP_SECURITY_HARDEN_RUNNER: ${{ vars.disable_harden_runner }}

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.repository == 'argoproj/argo-workflows'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: ${{ vars.disable_harden_runner != 'true' }}
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          # Workaround for segfaults under arm64:
          # https://github.com/docker/setup-qemu-action/issues/198#issuecomment-2653791775
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to registry
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAYIO_USERNAME }}
          password: ${{ secrets.QUAYIO_PASSWORD }}
      - name: Build dev container image
        run: make devcontainer-build
        env:
          TARGET_PLATFORM: linux/amd64,linux/arm64
          DEVCONTAINER_PUSH: ${{ github.event_name == 'push' && 'true' || 'false' }}
