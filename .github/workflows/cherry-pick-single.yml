name: Cherry Pick Single

on:
  workflow_call:
    inputs:
      merge_commit_sha:
        required: true
        type: string
        description: "The merge commit SHA to cherry-pick"
      version_number:
        required: true
        type: string
        description: "The version number (from cherry-pick/ label)"
      pr_number:
        required: true
        type: string
        description: "The original PR number"
      pr_title:
        required: true
        type: string
        description: "The original PR title"
    secrets:
      CHERRYPICK_APP_ID:
        required: true
      CHERRYPICK_APP_PRIVATE_KEY:
        required: true

jobs:
  cherry-pick:
    name: Cherry Pick to ${{ inputs.version_number }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.CHERRYPICK_APP_ID }}
          private-key: ${{ secrets.CHERRYPICK_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry pick commit
        id: cherry-pick
        env:
          MERGE_COMMIT: ${{ inputs.merge_commit_sha }}
          VERSION_NUMBER: ${{ inputs.version_number }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -e

          TARGET_BRANCH="release-${VERSION_NUMBER}"

          echo "🍒 Cherry-picking commit $MERGE_COMMIT to branch $TARGET_BRANCH"

          # Check if target branch exists
          if ! git show-ref --verify --quiet "refs/remotes/origin/$TARGET_BRANCH"; then
            echo "❌ Target branch '$TARGET_BRANCH' does not exist"
            exit 1
          fi

          # Create new branch for cherry-pick
          CHERRY_PICK_BRANCH="cherry-pick-${PR_NUMBER}-to-${TARGET_BRANCH}"
          git checkout -b "$CHERRY_PICK_BRANCH" "origin/$TARGET_BRANCH"

          # Perform cherry-pick
          if git cherry-pick -m 1 "$MERGE_COMMIT"; then
            echo "✅ Cherry-pick successful"

            # Extract Signed-off-by from the cherry-pick commit
            SIGNOFF=$(git log -1 --pretty=format:"%B" | grep -E '^Signed-off-by:' || echo "")

            # Push the new branch
            git push origin "$CHERRY_PICK_BRANCH"

            # Save data for PR creation
            echo "branch_name=$CHERRY_PICK_BRANCH" >> "$GITHUB_OUTPUT"
            echo "signoff=$SIGNOFF" >> "$GITHUB_OUTPUT"
            echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Cherry-pick failed due to conflicts"
            git cherry-pick --abort
            exit 1
          fi

      - name: Create Pull Request
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          PR_NUMBER: ${{ inputs.pr_number }}
          VERSION_NUMBER: ${{ inputs.version_number }}
          SIGNOFF: ${{ steps.cherry-pick.outputs.signoff }}
          TARGET_BRANCH: ${{ steps.cherry-pick.outputs.target_branch }}
          BRANCH_NAME: ${{ steps.cherry-pick.outputs.branch_name }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # Create cherry-pick PR
          TITLE="${PR_TITLE} (cherry-pick #${PR_NUMBER} for ${VERSION_NUMBER})"
          BODY=$(cat <<EOF
          Cherry-picked ${PR_TITLE} (#${PR_NUMBER})

          ${SIGNOFF}
          EOF
          )

          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base "$TARGET_BRANCH" \
            --head "$BRANCH_NAME"

          # Comment on original PR
          gh pr comment "$PR_NUMBER" \
            --body "🍒 Cherry-pick PR created for ${VERSION_NUMBER}: #$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')"

      - name: Comment on failure
        if: failure()
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          VERSION_NUMBER: ${{ inputs.version_number }}
          RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "❌ Cherry-pick failed for ${VERSION_NUMBER}. Please check the [workflow logs](https://github.com/argoproj/argo-workflows/actions/runs/${RUN_ID}) for details."
