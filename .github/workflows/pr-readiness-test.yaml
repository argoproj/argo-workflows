name: PR Readiness Helper Tests

# Unprivileged CI for the PR Readiness Helper's own code: type-check and unit
# test the TypeScript under .github/pr-readiness/. Runs only when that code
# changes. The bot itself runs the .ts directly via Node's type stripping
# (actions/github-script on node24); this job is what actually *checks* the
# types, since stripping does not type-check.

on:
  pull_request:
    paths:
      - .github/pr-readiness/**
      - .github/workflows/pr-readiness-test.yaml

permissions:
  contents: read

jobs:
  test:
    name: Type-check and unit test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .github/pr-readiness
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: .github/pr-readiness/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
