name: E2E failure debug
description: >-
  Dump the diagnostics common to the e2e-tests and e2e-ui jobs (k3d, controller,
  server, Tilt and workflow logs). Invoke with `if: failure()`. Every command is
  guarded with `|| true` so one failing diagnostic doesn't skip the rest — a
  composite step otherwise aborts the whole action on the first failure.

runs:
  using: composite
  steps:
    - name: Failure debug - k3d server logs
      shell: bash
      run: docker logs k3d-k3s-default-server-0 || true
    - name: Failure debug - Controller/API logs
      shell: bash
      run: |
        kubectl -n argo logs deploy/workflow-controller --prefix --tail=-1 || true
        kubectl -n argo logs deploy/argo-server --prefix --tail=-1 || true
    - name: Failure debug - Tilt logs
      shell: bash
      run: '[ -e /tmp/tilt.log ] && cat /tmp/tilt.log || true'
    - name: Failure debug - describe Workflows
      shell: bash
      run: |
        kubectl get wf || true
        kubectl describe wf || true
    - name: Failure debug - Workflow Pod logs
      shell: bash
      run: kubectl logs --all-containers -l workflows.argoproj.io/workflow --prefix || true
