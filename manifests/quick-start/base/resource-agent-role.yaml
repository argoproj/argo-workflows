# https://argo-workflows.readthedocs.io/en/latest/resource-template/
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: resource-agent
  annotations:
    workflows.argoproj.io/description: |
      This is the minimum recommended permissions needed if you want to use agent-based
      resource templates.

      In addition to these rules, you must grant `create`, `list` and `watch` on every
      resource kind your resource templates create, so the agent can create the resource
      and then watch it for its success/failure conditions.
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtasksets
    verbs:
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtasksets/status
    verbs:
      - patch
  # `manifestFrom` manifests are resolved via the Kubernetes API
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
