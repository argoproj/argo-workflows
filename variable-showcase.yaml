apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: variable-showcase-
  labels:
    team: platform
  annotations:
    owner: isitha
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: greeting
        value: hello
      - name: fruits
        value: '["apple","banana","cherry"]'

  # resolved via expression evaluator before the main DAG runs
  podMetadata:
    labels:
      run-name: "{{workflow.name}}"
      upper-greeting: "{{=upper(workflow.parameters.greeting)}}"

  templates:
    - name: main
      outputs:
        parameters:
          - name: result-doubled
            valueFrom:
              expression: "asInt(steps.generate.outputs.result) * 2"
      steps:
        # --- Step 1: emit a value; demonstrates outputs.result ---
        - - name: generate
            template: echo-number

        # --- Step 2: consume Step 1's result; demonstrates step-scoped refs ---
        - - name: double
            template: multiply
            arguments:
              parameters:
                - name: num
                  value: "{{steps.generate.outputs.result}}"
                - name: factor
                  value: "2"

        # --- Step 3: withItems loop; demonstrates {{item}} ---
        - - name: fan-out-list
            template: say
            arguments:
              parameters:
                - name: msg
                  value: "{{workflow.parameters.greeting}} {{item}}"
            withItems: [world, argo, kubernetes]

        # --- Step 4: withParam reading a JSON string parameter ---
        - - name: fan-out-json
            template: say
            arguments:
              parameters:
                - name: msg
                  value: "fruit={{item}}"
            withParam: "{{workflow.parameters.fruits}}"

        # --- Step 5: expression tag using step + workflow scope ---
        - - name: decide
            template: say
            arguments:
              parameters:
                - name: msg
                  value: "{{= steps.double.outputs.result == '20' ? 'ok' : 'bad' }}"

        # --- Step 6: retries + pod/node variables ---
        - - name: flaky
            template: retry-demo

    - name: echo-number
      script:
        image: alpine:3
        command: [sh]
        source: |
          echo 10

    - name: multiply
      inputs:
        parameters:
          - name: num
          - name: factor
      script:
        image: alpine:3
        command: [sh]
        source: |
          echo $(( {{inputs.parameters.num}} * {{inputs.parameters.factor}} ))

    # Children of withItems/withParam steps have their outputs.result aggregated
    # via json.Unmarshal by processAggregateNodeOutputs. The stdout must therefore
    # be valid JSON, so we wrap it in double quotes.
    - name: say
      inputs:
        parameters:
          - name: msg
      script:
        image: alpine:3
        command: [sh]
        source: |
          printf '%s' '"{{inputs.parameters.msg}} (pod={{pod.name}})"'

    - name: retry-demo
      retryStrategy:
        limit: "3"
        retryPolicy: Always
      container:
        image: alpine:3
        command: [sh, -c]
        args:
          - |
            echo "attempt={{retries}} lastExit={{retries.lastExitCode}} pod={{pod.name}}"
            [ "{{retries}}" = "2" ]

    # workflow.failures is a JSON array; wrap each arg in single quotes so the
    # embedded double-quotes and parens don't break the shell.
    - name: exit-handler
      container:
        image: alpine:3
        command: [sh, -c]
        args:
          - printf 'wf=%s\nstatus=%s\nduration=%s\nfailures=%s\n'
            '{{workflow.name}}'
            '{{workflow.status}}'
            '{{workflow.duration}}'
            '{{workflow.failures}}'
  onExit: exit-handler
