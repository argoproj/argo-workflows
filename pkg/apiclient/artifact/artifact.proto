syntax = "proto3";
option go_package = "github.com/argoproj/argo-workflows/v4/pkg/apiclient/artifact";

import "google/api/annotations.proto";

// Artifact Service
//
// Artifact Service API provides GRPC access to artifact operations
package artifact;

// Plugin Artifact configuration
message PluginArtifact {
  string name = 1;
  string configuration = 2;
  int32 connection_timeout_seconds = 3;
  string key = 4;
}

// Artifact representation for gRPC
message Artifact {
  string name = 1;
  string path = 2;
  int32 mode = 3;
  string from = 4;
  PluginArtifact plugin = 5;
  bool optional = 6;
  string sub_path = 7;
  bool recurse_mode = 8;
  string from_expression = 9;
  bool deleted = 10;
}

message LoadArtifactRequest {
  Artifact input_artifact = 1;
  string path = 2;
}

message LoadArtifactResponse {
  bool success = 1;
  string error = 2;
}

message OpenStreamRequest {
  Artifact artifact = 1;
}

message OpenStreamResponse {
  bytes data = 1;
  bool is_end = 2;
  string error = 3;
}

message SaveArtifactRequest {
  string path = 1;
  Artifact output_artifact = 2;
}

message SaveArtifactResponse {
  bool success = 1;
  string error = 2;
}

message DeleteArtifactRequest {
  Artifact artifact = 1;
}

message DeleteArtifactResponse {
  bool success = 1;
  string error = 2;
}

message ListObjectsRequest {
  Artifact artifact = 1;
}

message ListObjectsResponse {
  repeated string objects = 1;
  string error = 2;
}

message IsDirectoryRequest {
  Artifact artifact = 1;
}

message IsDirectoryResponse {
  bool is_directory = 1;
  string error = 2;
}

// SaveStreamArtifactRequest is sent as a stream of frames: the first frame carries
// output_artifact (metadata only), and every subsequent frame carries a chunk of the
// artifact's content.
message SaveStreamArtifactRequest {
  Artifact output_artifact = 1;
  bytes chunk = 2;
}

message GetCapabilitiesRequest {
}

message GetCapabilitiesResponse {
  // supports_save_stream indicates whether this plugin implements the streaming
  // SaveStream RPC. Callers should check this before invoking SaveStream, since a
  // reader already partially consumed cannot be rewound to fall back to Save.
  bool supports_save_stream = 1;
}

service ArtifactService {
  rpc Load(LoadArtifactRequest) returns (LoadArtifactResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/load"
      body : "*"
    };
  }

  rpc OpenStream(OpenStreamRequest) returns (stream OpenStreamResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/stream"
      body : "*"
    };
  }

  rpc Save(SaveArtifactRequest) returns (SaveArtifactResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/save"
      body : "*"
    };
  }

  rpc Delete(DeleteArtifactRequest) returns (DeleteArtifactResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/delete"
      body : "*"
    };
  }

  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/list"
      body : "*"
    };
  }

  rpc IsDirectory(IsDirectoryRequest) returns (IsDirectoryResponse) {
    option (google.api.http) = {
      post : "/api/v1/artifacts/is-directory"
      body : "*"
    };
  }

  // SaveStream is a client-streaming RPC for plugins that can accept an artifact's
  // content chunk by chunk instead of buffering it to a temp file first. No HTTP
  // gateway is exposed for this RPC: plugins communicate over a direct gRPC
  // connection on a unix socket, so no HTTP transcoding is needed, and
  // grpc-gateway v1 cannot cleanly represent client-streaming RPCs anyway.
  rpc SaveStream(stream SaveStreamArtifactRequest) returns (SaveArtifactResponse);

  // GetCapabilities lets a caller check whether a plugin supports SaveStream before
  // it starts reading the artifact's content, since a partially consumed reader
  // cannot be rewound to fall back to Save.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}