apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: http-tmpl-dag
spec:
  entrypoint: main
  templates:
  - name: main
    dag:
      tasks:
      - name: A
        template: whalesay
  - name: whalesay
    container:
      image: docker/whalesay
      command: [cowsay]
      args: ["hello world"]
