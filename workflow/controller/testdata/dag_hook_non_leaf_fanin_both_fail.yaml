# Regression test: lifecycle hooks on two parallel fan-in inputs that both fail
# simultaneously must both fire before their shared downstream task is Omitted.
#
# Topology: step-a (fail-inner) ─┐
#                                 ├→ step-c (succeed-inner)
#           step-b (fail-inner) ─┘
# Both step-a and step-b have notify hooks on failure.
# Expected: both hooks fire; step-c Omitted only AFTER both hooks complete.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: dag-hook-non-leaf-fanin-both
  namespace: argo
spec:
  entrypoint: main
  templates:
    - name: main
      dag:
        tasks:
          - name: step-a
            template: fail-inner
            hooks:
              notify:
                template: echo
                expression: tasks["step-a"].status == "Failed"
          - name: step-b
            template: fail-inner
            hooks:
              notify:
                template: echo
                expression: tasks["step-b"].status == "Failed"
          - name: step-c
            template: succeed-inner
            depends: "step-a && step-b"

    - name: fail-inner
      dag:
        tasks:
          - name: inner
            template: fail-pod

    - name: succeed-inner
      dag:
        tasks:
          - name: inner
            template: succeed-pod

    - name: fail-pod
      container:
        image: alpine:3.23
        command: [sh, -c]
        args: ["exit 1"]

    - name: succeed-pod
      container:
        image: alpine:3.23
        command: [sh, -c]
        args: ["echo done"]

    - name: echo
      container:
        image: alpine:3.23
        command: [echo]
        args: ["hook fired"]
