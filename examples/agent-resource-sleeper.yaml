apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: agent-resource-sleeper-
spec:
  entrypoint: main
  templates:
  - name: main
    resource:
      action: create
      setOwnerReference: true
      # Pod exits with code 0 → status.phase becomes "Succeeded"; anything
      # else (timeout, OOM, non-zero exit) → "Failed".
      successCondition: status.phase=Succeeded
      failureCondition: status.phase=Failed
      manifest: |
        apiVersion: v1
        kind: Pod
        metadata:
          generateName: agent-sleeper-
        spec:
          restartPolicy: Never
          # 300s well over the 120s sleep so the kubelet doesn't kill the
          # pod before it can exit cleanly.
          activeDeadlineSeconds: 300
          containers:
          - name: sleeper
            image: busybox:1.36
            command: ["sh", "-c", "sleep 120"]
