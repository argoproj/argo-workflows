apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: steps-skipped-withparam-ref-
spec:
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: producer
            template: produce
            when: "false" # -> Skipped, produces no real output
        - - name: consumer
            template: consume
            withParam: "{{steps.producer.outputs.parameters.items}}"
            arguments:
              parameters:
                - name: in
                  value: "{{item}}"
    - name: produce
      outputs:
        parameters:
          - name: items
            valueFrom:
              path: /tmp/out.txt # NOTE: no default here
      container:
        image: argoproj/argosay:v2
        args: ["echo", '["real"]', "/tmp/out.txt"]
    - name: consume
      inputs:
        parameters:
          - name: in
      container:
        image: argoproj/argosay:v2
        args: ["echo", "consumer got: [{{inputs.parameters.in}}]"]
