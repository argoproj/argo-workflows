# minimal profile + init-less pod mode. Used by CI for initless:true matrix
# entries on k8s_version: max. Requires K8s image volumes (Beta in 1.33
# behind a feature gate, GA in 1.36).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../minimal

components:
  - ../components/initless-pod
