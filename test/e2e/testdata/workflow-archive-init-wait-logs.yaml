apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: archive-init-wait-logs-
  labels:
    workflows.argoproj.io/test: "true"
spec:
  entrypoint: main
  templates:
    - name: main
      archiveLocation:
        archiveLogs: true
        archiveSystemContainerLogs: true
        s3:
          bucket: my-bucket
          endpoint: minio:9000
          insecure: true
          accessKeySecret:
            name: my-minio-cred
            key: accesskey
          secretKeySecret:
            name: my-minio-cred
            key: secretkey
      container:
        image: argoproj/argosay:v2
        args: ["echo", "hello from archive-init-wait-logs test"]
