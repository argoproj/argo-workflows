apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: archive-init-fail-
  labels:
    workflows.argoproj.io/test: "true"
spec:
  entrypoint: main
  templates:
    - name: main
      archiveLocation:
        archiveLogs: true
        archiveSystemContainerLogs: true
        s3:
          bucket: my-bucket
          endpoint: minio:9000
          insecure: true
          accessKeySecret:
            name: my-minio-cred
            key: accesskey
          secretKeySecret:
            name: my-minio-cred
            key: secretkey
      # Force the argoexec init (Argo system init) container to fail.
      # Rather than a user-defined initContainer, reference a nonexistent input artifact
      # so that argoexec init itself fails and the wait container never starts.
      inputs:
        artifacts:
          - name: nonexistent-artifact
            path: /tmp/nonexistent
            s3:
              bucket: nonexistent-bucket
              key: nonexistent-key
      container:
        image: argoproj/argosay:v2
        args: ["echo", "this never runs"]
